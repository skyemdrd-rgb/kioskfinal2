<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSC Kiosk Directory</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:black;
}

body{
  touch-action:manipulation;
}

#loader{
  position:fixed;
  inset:0;
  background:black;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:60px;
  z-index:99999;
}

#app{
  position:absolute;
  width:3840px;
  height:2160px;
  overflow:hidden;

  left:50%;
  top:50%;

  transform-origin:center center;
}

.screen{
  position:absolute;
  inset:0;
  opacity:0;
  pointer-events:none;
  transition:opacity .3s ease;
}

.screen.active{
  opacity:1;
  pointer-events:auto;
}

.background,
.video-bg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}

.background{
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}

.video-bg{
  object-fit:cover;
}

.hotspot{
  position:absolute;
  z-index:20;
  cursor:pointer;
}

.startHotspot{
  inset:0;
}

.home{
  left:14%;
  width:21.67%;
  height:23.67%;
  bottom:0;
}

.guide{
  left:38.3%;
  width:25.32%;
  height:23.67%;
  bottom:0;
}

.about{
  left:64.2%;
  width:24.32%;
  height:23.67%;
  bottom:0;
}

.backHome{
  bottom:0;
  right:0;
  width:5.5%;
  height:10%;
}

.bigbackHome{
  bottom:3%;
  right:0;
  width:10.5%;
  height:16%;
}

/* CLINIC BUTTONS */

.dentalBtn{
  top:22%;
  left:12%;
  width:24%;
  height:16%;
}

.entBtn{
  top:22%;
  left:38%;
  width:24%;
  height:16%;
}

.obBtn{
  top:22%;
  left:64%;
  width:24%;
  height:16%;
}

.pediaBtn{
  top:43%;
  left:12%;
  width:24%;
  height:16%;
}

.radioBtn{
  top:43%;
  left:38%;
  width:24%;
  height:16%;
}

.rehabBtn{
  top:43%;
  left:64%;
  width:24%;
  height:16%;
}

.internalBtn{
  top:64%;
  left:12%;
  width:24%;
  height:16%;
}

.ophthaBtn{
  top:64%;
  left:38%;
  width:24%;
  height:16%;
}

.surgeryBtn{
  top:64%;
  left:64%;
  width:24%;
  height:16%;
}

.internalNext{
  right:0;
  bottom:10%;
  width:5.5%;
  height:7%;
}

.internalPrev{
  right:0;
  bottom:18%;
  width:5.5%;
  height:7%;
}

</style>
</head>

<body>

<div id="loader">Loading...</div>

<div id="app">

  <!-- START -->

  <div id="startScreen" class="screen active">

    <video class="video-bg" autoplay muted loop playsinline>
      <source src="idle.mp4" type="video/mp4">
    </video>

    <div class="hotspot startHotspot"
         onclick="goHome()">
    </div>

  </div>

  <!-- HOME -->

  <div id="homeScreen" class="screen">

    <div class="background"
         style="background-image:url('home.png')">
    </div>

    <div class="hotspot home"
         onclick="goHome()">
    </div>

    <div class="hotspot guide"
         onclick="goGuide()">
    </div>

    <div class="hotspot about"
         onclick="showScreen('aboutScreen')">
    </div>

  </div>

  <!-- ABOUT -->

  <div id="aboutScreen" class="screen">

    <div class="background"
         style="background-image:url('about.jpg')">
    </div>

    <div class="hotspot backHome"
         onclick="goHome()">
    </div>

  </div>

  <!-- GUIDE -->

  <div id="guideScreen" class="screen">

    <div class="background"
         style="background-image:url('guide.jpg')">
    </div>

    <div class="hotspot bigbackHome"
         onclick="goHome()">
    </div>

  </div>

  <!-- CLINICS -->

  <div id="clinicsScreen" class="screen">

    <div class="background"
         style="background-image:url('clinics.png')">
    </div>

    <div class="hotspot bigbackHome"
         onclick="goGuide()">
    </div>

    <div class="hotspot dentalBtn"
         onclick="showScreen('dentistryScreen')">
    </div>

    <div class="hotspot entBtn"
         onclick="showScreen('entScreen')">
    </div>

    <div class="hotspot obBtn"
         onclick="showScreen('obgyneScreen')">
    </div>

    <div class="hotspot pediaBtn"
         onclick="showScreen('pediatricsScreen')">
    </div>

    <div class="hotspot radioBtn"
         onclick="showScreen('radiationScreen')">
    </div>

    <div class="hotspot rehabBtn"
         onclick="showScreen('rehabScreen')">
    </div>

    <div class="hotspot internalBtn"
         onclick="showScreen('internalMedicineScreen')">
    </div>

    <div class="hotspot ophthaBtn"
         onclick="showScreen('ophthalmologyScreen')">
    </div>

    <div class="hotspot surgeryBtn"
         onclick="showScreen('surgeryScreen')">
    </div>

  </div>

  <!-- REHAB -->

  <div id="rehabScreen" class="screen">

    <div class="background"
         style="background-image:url('rehab.png')">
    </div>

    <div class="hotspot backHome"
         onclick="showScreen('clinicsScreen')">
    </div>

  </div>

  <!-- INTERNAL PAGE 1 -->

  <div id="internalMedicineScreen" class="screen">

    <div class="background"
         style="background-image:url('internal1.png')">
    </div>

    <div class="hotspot internalNext"
         onclick="showScreen('internalMedicineScreen2')">
    </div>

    <div class="hotspot backHome"
         onclick="showScreen('clinicsScreen')">
    </div>

  </div>

  <!-- INTERNAL PAGE 2 -->

  <div id="internalMedicineScreen2" class="screen">

    <div class="background"
         style="background-image:url('internal2.png')">
    </div>

    <div class="hotspot internalPrev"
         onclick="showScreen('internalMedicineScreen')">
    </div>

    <div class="hotspot backHome"
         onclick="showScreen('clinicsScreen')">
    </div>

  </div>

</div>

<script>

window.addEventListener('load', ()=>{

  const app = document.getElementById('app');
  const loader = document.getElementById('loader');
  const screens = document.querySelectorAll('.screen');

  /* =========================
     RESPONSIVE SCALE
  ========================= */

  function scaleApp(){

    const baseWidth = 3840;
    const baseHeight = 2160;

    const scale = Math.min(
      window.innerWidth / baseWidth,
      window.innerHeight / baseHeight
    );

    app.style.transform =
      `translate(-50%, -50%) scale(${scale})`;

  }

  scaleApp();

  window.addEventListener('resize', scaleApp);

  /* =========================
     SCREEN SYSTEM
  ========================= */

  window.showScreen = function(id){

    screens.forEach(screen=>{
      screen.classList.remove('active');
    });

    const target = document.getElementById(id);

    if(target){
      target.classList.add('active');
    }

    resetIdleTimer();

  };

  window.goHome = function(){
    showScreen('homeScreen');
  };

  window.goGuide = function(){
    showScreen('guideScreen');
  };

  /* =========================
     IDLE TIMER
  ========================= */

  let idleTimer;

  function resetIdleTimer(){

    clearTimeout(idleTimer);

    idleTimer = setTimeout(()=>{

      showScreen('startScreen');

    },30000);

  }

  document.addEventListener('mousemove', resetIdleTimer);
  document.addEventListener('mousedown', resetIdleTimer);
  document.addEventListener('touchstart', resetIdleTimer);
  document.addEventListener('click', resetIdleTimer);

  resetIdleTimer();

  loader.style.display = 'none';

});

</script>

</body>
</html>
